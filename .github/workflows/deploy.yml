name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger deploy webhook
        id: webhook
        run: |
          DEPLOY_SECRET='${{ secrets.DEPLOY_SECRET }}'
          DEPLOY_URL='${{ secrets.DEPLOY_URL }}'

          if [ -z "$DEPLOY_SECRET" ] || [ -z "$DEPLOY_URL" ]; then
            echo "::error::Missing DEPLOY_SECRET or DEPLOY_URL secret in repository settings"
            echo "DEPLOY_SECRET="$DEPLOY_SECRET""
            echo "DEPLOY_URL="$DEPLOY_URL""
            exit 1
          fi

          PAYLOAD='{"ref":"refs/heads/main","after":"${{ github.sha }}"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hex -hmac "$DEPLOY_SECRET" | awk '{print $NF}')
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" \
            "$DEPLOY_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          echo "response=$BODY" >> $GITHUB_OUTPUT
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Check deploy result
        run: |
          RESPONSE='${{ steps.webhook.outputs.response }}'
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',''))" 2>/dev/null || echo "")

          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Deploy failed on server"
            exit 1
          fi

          echo "✅ Deploy successful!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::🚨 Deploy to production FAILED for commit ${{ github.sha }}"
          echo "::error::Check server logs at storage/logs/deploy.log"
